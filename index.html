<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Difendi la torre di Cerrano</title>
</head>
<body>
<link rel="stylesheet" href="style.css">

<canvas id="canvas" width="950" height="550">
<div class="fortezza"></div>
</canvas>

<h4>Scegli il tuo peronaggio</h4>
<select id="sceltaPersonaggio">
  <option value="napoli.png">Pocoyo</option>
  <option value="mario.png">Mario</option>
  <option value="ronaldo.png">Ronaldo</option>
  <option value="azzurra.png">Azzurra</option>
</select>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let x = 100;
let y = 100;
let size = 100; // Misura immagine
let keys = {};
let proiettili = [];
let nemici = []; // Array nemici
let punteggio = 0;
let gameOver = false;


document.addEventListener("keydown", function(aura) {
  keys[aura.key] = true;

  
  if (aura.key === " ") {
    // Aggiungiamo un nuovo proiettile nell'array
    proiettili.push({
      // x del cubo + metà della sua grandezza
      x: x + size / 2, //proiettile parte del centro (dio *)
      y: y,
      width: 10,
      height: 20,
      speed: 5
    });
  }
});


document.addEventListener("keyup", function(aura) {
  keys[aura.key] = false;
});

function limiti() {               // Cosi non esce dal canvas
  if (x < 0) x = 0;
  if (y < 0) y = 0;
  if (x > canvas.width - size) x = canvas.width - size;
  if (y > canvas.height - size) y = canvas.height - size;
}



function creaNemico() {
  nemici.push({
    x: Math.random() * (canvas.width - 60),
    y: -100, // parte da fuori lo schermo
    width: 60,
    height: 60,   
    speed: 1 + Math.random() * 2
  });
}

// Ogni secondo crea un nemico
setInterval(creaNemico, 1000);


const audio = new Audio("");
audio.pause()
audio.currentTime = 0
audio.play()
const immagine = new Image();
immagine.src = "napoli.png"; // immagine iniziale

const cambioImg = document.getElementById("sceltaPersonaggio");

cambioImg.addEventListener("change", function() {
  immagine.src = this.value; // cambia personaggio
});

function napoli() {

  if (gameOver) {
    ctx.fillStyle = "red";
    ctx.font = "50px Arial";
    ctx.fillText("GAME OVER", canvas.width / 2 - 150, canvas.height / 2);
    return; // Ferma il gioco
  }

  // Movimenti del cubo
  if (keys["ArrowRight"]) x += 5;
  if (keys["ArrowLeft"]) x -= 5;
  if (keys["ArrowUp"]) y -= 5;
  if (keys["ArrowDown"]) y += 5;

  limiti();

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Disegno immagine
  ctx.drawImage(immagine, x, y, size, size);


  // Per ogni proiettile che si spara, 
  // si muoveeee il proiettile verso l’alto di tanti pixel quanti sono nella sua proprietà speed
  for (let i = 0; i < proiettili.length; i++) { 
    proiettili[i].y -= proiettili[i].speed;

    ctx.fillStyle = "black";
    ctx.fillRect(
      proiettili[i].x,      // Misure proiettile 
      proiettili[i].y,
      proiettili[i].width,
      proiettili[i].height
    );
  }

  for (let i = 0; i < nemici.length; i++) {

    nemici[i].y += nemici[i].speed;

    ctx.fillStyle = "red";
    ctx.fillRect(
      nemici[i].x,
      nemici[i].y,
      nemici[i].width,
      nemici[i].height,
      ctx.drawImage(immagine, x, y, size, size)

    );


// Collisione player - nemici
for (let nemico of nemici) {
  if (
    x < nemico.x + nemico.width &&
    x + size > nemico.x &&
    y < nemico.y + nemico.height &&
    y + size > nemico.y
  ) {
    gameOver = true;
  }
}

// Collisione proiettili - nemici
for (let i = proiettili.length - 1; i >= 0; i--) {
  for (let j = nemici.length - 1; j >= 0; j--) {

    let p = proiettili[i];
    let n = nemici[j];

    if (
      p.x < n.x + n.width &&
      p.x + p.width > n.x &&
      p.y < n.y + n.height &&
      p.y + p.height > n.y
    ) {
      nemici.splice(j, 1);
      proiettili.splice(i, 1);
      punteggio++;
      break;
    }
  }
}

  ctx.fillStyle = "black";
  ctx.font = "20px Arial";
  ctx.fillText("Punteggio: " + punteggio, 20, 30);

  requestAnimationFrame(napoli);
}

napoli();
</script>

</body>
</html>
