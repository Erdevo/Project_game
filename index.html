<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Difendi la torre di Cerrano</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="canvas" width="950" height="550"></canvas>

<h4>Scegli il tuo personaggio</h4>
<select id="sceltaPersonaggio">
  <option value="napoli.png">Pocoyo</option>
  <option value="mario.png">Mario</option>
  <option value="ronaldo.png">Ronaldo</option>
  <option value="azzurra.png">Azzurra</option>
  <option value="paolo.png">Paolo Ruffini</option>
  <option value="damiano.png">Damiano</option>
  <option value="aura.png">Aura</option>
  <option value="nig.png">Nero</option>
</select>

<input type="button" id="scegli" value="SCEGLI">

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// bottone per iniziare
const scegli = document.getElementById("scegli");

// suono del gioco
const audio = new Audio("nugget.mp3");

// posizione iniziale del giocatore
let x = 400;
let y = 400;
let size = 75;

// oggetti del gioco
let keys = {};
let proiettili = [];
let nemici = [];

// punteggio
let punteggio = 0;

// stato del gioco
let gameOver = false;
let win = false;

document.addEventListener("keydown", function(event) {

  keys[event.key] = true;

  // sparo con barra spaziatrice
  if (event.key === " ") {
    proiettili.push({
      x: x + size / 2,
      y: y,
      width: 10,
      height: 20,
      speed: 5
    });
  }
});

document.addEventListener("keyup", function(event) {
  keys[event.key] = false;
});


//limiti

function limiti() {

  if (x < 0) x = 0;
  if (y < 0) y = 0;
  if (x > canvas.width - size) x = canvas.width - size;
  if (y > canvas.height - size) y = canvas.height - size;

}


//crea nemici

function creaNemico() {

  nemici.push({
    x: Math.random() * (canvas.width - 40),
    y: -100,
    width: 60,
    height: 60,
    speed: 1 + Math.random() * 3
  });

}

setInterval(creaNemico, 1200);

const immagine = new Image();
immagine.src = "napoli.png";
const nemico = new Image();
nemico.src = "jeffrey-epstein.png"; 

const cambioImg = document.getElementById("sceltaPersonaggio");

// cambio personaggio
cambioImg.addEventListener("change", function() {
  immagine.src = this.value;
});



function napoli() {

  //lose
  if (gameOver) {
    ctx.fillStyle = "red";
    ctx.font = "50px Arial";
    ctx.fillText("HAI PERSO", canvas.width / 2 - 140 , canvas.height / 2);
    return;
  }
  if (punteggio >= 50) {
    win = true;
  }
  // win
  if (win) {
    ctx.fillStyle = "yellow";
    ctx.font = "50px Arial";
    ctx.fillText("HAI VINTO!", canvas.width / 2 - 140 , canvas.height / 2);
    return;
  }

  // movimento del personaggio
  if (keys["ArrowRight"]) x += 7;
  if (keys["ArrowLeft"]) x -= 7;
  if (keys["ArrowUp"]) y -= 7;
  if (keys["ArrowDown"]) y += 7;

  limiti();

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // disegna il personaggio
  ctx.drawImage(immagine, x, y, size, size);


  //proiettili 

  for (let i = 0; i < proiettili.length; i++) {

    proiettili[i].y -= proiettili[i].speed;

    ctx.fillStyle = "black";
    ctx.fillRect(
      proiettili[i].x,
      proiettili[i].y,
      proiettili[i].width,
      proiettili[i].height
    );
  }


  // nemici 

  for (let i = 0; i < nemici.length; i++) {

    nemici[i].y += nemici[i].speed;

    ctx.drawImage(
      nemico,
      nemici[i].x,
      nemici[i].y,
      nemici[i].width,
      nemici[i].height
    );

    // collisione con il giocatore
    if (
      x < nemici[i].x + nemici[i].width &&
      x + size > nemici[i].x &&
      y < nemici[i].y + nemici[i].height &&
      y + size > nemici[i].y
    ) {
      gameOver = true;
    }
  }


  // collisioni 

  for (let i = 0; i < proiettili.length; i++) {
    for (let j = 0; j < nemici.length; j++) {

      if (
        proiettili[i].x < nemici[j].x + nemici[j].width &&
        proiettili[i].x + proiettili[i].width > nemici[j].x &&
        proiettili[i].y < nemici[j].y + nemici[j].height &&
        proiettili[i].y + proiettili[i].height > nemici[j].y
      ) {

        nemici.splice(j, 1);
        proiettili.splice(i, 1);

        punteggio++;

        break;
      }
    }
  }


  // PUNTEGGIO

  ctx.fillStyle = "black";
  ctx.font = "20px Arial";
  ctx.fillText("Punteggio: " + punteggio, 20, 30);

  requestAnimationFrame(napoli);

}


// avvio gioco

scegli.addEventListener("click", function(){

  audio.play(); // musica
  napoli();     // avvia il gioco
  scegli.blur();
  canvas.focus();

});

</script>

</body>
</html>
