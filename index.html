<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Difendi la torre di Cerrano</title>
</head>
<body>
<link rel="stylesheet" href="style.css">


<canvas id="canvas" width="950" height="550">
<div class="fortezza"></div>
</canvas>

<h4>Scegli il tuo peronaggio</h4>
<select id="sceltaPersonaggio">
  <option value="napoli.png">Pocoyo</option>
  <option value="mario.png">Mario</option>
  <option value="ronaldo.png">Ronaldo</option>
  <option value="azzurra.png">Azzurra</option>
</select>

<script>
const canvas = document.getElementById("canvas");
const scegli = document.getElementById("scegli");
const ctx = canvas.getContext("2d");

let x = 400;
let y = 400;
let size = 75;
let keys = {};
let proiettili = [];
let nemici = [];
let punteggio = 0;
let gameOver = false;


document.addEventListener("keydown", function(aura) {
  
  keys[aura.key] = true;

  
  if (aura.key === " ") {
    proiettili.push({
      x: x + size / 2,
      y: y,
      width: 10,
      height: 20,
      speed: 5
    });
  }
});


document.addEventListener("keyup", function(aura) {
  keys[aura.key] = false;
});


function limiti() {
  if (x < 0) x = 0;
  if (y < 0) y = 0;
  if (x > canvas.width - size) x = canvas.width - size;
  if (y > canvas.height - size) y = canvas.height - size;
}



function creaNemico() {
  nemici.push({
    x: Math.random() * (canvas.width - 40),
    y: -100,
    width: 60,
    height: 60,   
    speed: 1 + Math.random() * 2
  });
}


setInterval(creaNemico, 1200);

const audio = new Audio("");
audio.pause()
audio.currentTime = 0
audio.play()
const immagine = new Image();
immagine.src = "napoli.png"; // immagine iniziale

const cambioImg = document.getElementById("sceltaPersonaggio");


cambioImg.addEventListener("change", function() {
  immagine.src = this.value;
});


function napoli() {


  if (gameOver) {
    ctx.fillStyle = "yellow";
    ctx.font = "50px Arial";
    ctx.fillText("HAI PERSO", canvas.width / 2 - 140 , canvas.height / 2);
    return;
  }


  // Movimenti del cubo
  if (keys["ArrowRight"]) x += 5;
  if (keys["ArrowLeft"]) x -= 5;
  if (keys["ArrowUp"]) y -= 5;
  if (keys["ArrowDown"]) y += 5;

  limiti();


  ctx.clearRect(0, 0, canvas.width, canvas.height);


  ctx.drawImage(immagine, x, y, size, size);


  // Per ogni proiettile che si spara, 
  // si muoveeee il proiettile verso l’alto di tanti pixel quanti sono nella sua proprietà speed
  for (let i = 0; i < proiettili.length; i++) { 
    proiettili[i].y -= proiettili[i].speed;


    ctx.fillStyle = "black";
    ctx.fillRect(
      proiettili[i].x,      // Misure proiettile 
      proiettili[i].y,
      proiettili[i].width,
      proiettili[i].height
    );
  }


  for (let i = 0; i < nemici.length; i++) {


    nemici[i].y += nemici[i].speed;

    ctx.fillStyle = "red";
    ctx.fillRect(
      nemici[i].x,
      nemici[i].y,
      nemici[i].width,
      nemici[i].height,
      ctx.drawImage(immagine, x, y, size, size)

    );


    if (
      x < nemici[i].x + nemici[i].width &&
      x + size > nemici[i].x &&
      y < nemici[i].y + nemici[i].height &&
      y + size > nemici[i].y
    ) {
      gameOver = true;
    }
  }


  for (let i = 0; i < proiettili.length; i++) {
    for (let j = 0; j < nemici.length; j++) {

      if (
        proiettili[i].x < nemici[j].x + nemici[j].width &&
        proiettili[i].x + proiettili[i].width > nemici[j].x &&
        proiettili[i].y < nemici[j].y + nemici[j].height &&
        proiettili[i].y + proiettili[i].height > nemici[j].y
      ) {
        nemici.splice(j, 1);         //instances changes the contents of an array by removing or replacing existing elements and adding new elements 
        proiettili.splice(i, 1);
        punteggio += 1;
        break;
      }
    }
  }


  ctx.fillStyle = "black";
  ctx.font = "20px Arial";
  ctx.fillText("Punteggio: " + punteggio, 20, 30);


  requestAnimationFrame(napoli);
}


scegli.addEventListener("click", function(){
  audio.play();
  napoli();
});

</script>


</body>
</html>
